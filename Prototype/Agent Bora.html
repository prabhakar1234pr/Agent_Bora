<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Bora</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#F7F9F8;
  --surface:#FFFFFF;
  --surface-2:#F2F5F4;
  --surface-3:#ECF0EE;
  --text:#0E1714;
  --text-2:#56635E;
  --text-3:#8B968F;
  --border:#E5EAE7;
  --border-2:#D8DEDA;
  --accent:#10B981;
  --accent-d:color-mix(in oklab, var(--accent) 82%, #000);
  --accent-t:color-mix(in oklab, var(--accent) 13%, #fff);
  --accent-ring:color-mix(in oklab, var(--accent) 45%, #fff);
  --accent-ink:color-mix(in oklab, var(--accent) 62%, #07120d);
  --danger:#E5484D;
  --radius:14px;
  --radius-lg:22px;
  --radius-sm:10px;
  --shadow-sm:0 1px 2px rgba(16,30,24,.05), 0 1px 1px rgba(16,30,24,.04);
  --shadow-md:0 4px 16px -4px rgba(16,30,24,.10), 0 2px 6px -2px rgba(16,30,24,.06);
  --shadow-lg:0 24px 60px -18px rgba(16,30,24,.22), 0 8px 24px -10px rgba(16,30,24,.12);
  --shadow-accent:0 12px 30px -10px color-mix(in oklab, var(--accent) 45%, transparent);
  --font-display:'Space Grotesk', system-ui, sans-serif;
  --font-body:'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono:'JetBrains Mono', ui-monospace, monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  font-family:var(--font-body);
  background:var(--bg);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
  font-size:15px;
  line-height:1.5;
}
h1,h2,h3,h4,h5{font-family:var(--font-display);font-weight:600;margin:0;letter-spacing:-.02em;line-height:1.08;color:var(--text)}
p{margin:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
::selection{background:var(--accent-ring);color:var(--accent-ink)}
input,textarea,select{font-family:inherit}
img{display:block;max-width:100%}
.mono{font-family:var(--font-mono)}
.serifItalic{font-style:italic}

/* scrollbars */
*::-webkit-scrollbar{width:10px;height:10px}
*::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:20px;border:3px solid transparent;background-clip:padding-box}
*::-webkit-scrollbar-thumb:hover{background:var(--text-3);background-clip:padding-box}

/* ---------- Buttons ---------- */
.btn{
  --bh:42px;
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  height:var(--bh);padding:0 18px;border-radius:11px;border:1px solid transparent;
  font-family:var(--font-body);font-weight:600;font-size:14px;letter-spacing:-.01em;
  cursor:pointer;white-space:nowrap;transition:all .16s cubic-bezier(.3,.8,.4,1);
  background:transparent;color:var(--text);user-select:none;
}
.btn:active{transform:translateY(.5px) scale(.992)}
.btn svg{width:17px;height:17px;flex:none}
.btn-primary{background:var(--accent);color:#fff;box-shadow:var(--shadow-accent)}
.btn-primary:hover{background:var(--accent-d)}
.btn-secondary{background:var(--surface);color:var(--text);border-color:var(--border-2);box-shadow:var(--shadow-sm)}
.btn-secondary:hover{border-color:var(--text-3);background:var(--surface)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--surface-2);color:var(--text)}
.btn-soft{background:var(--accent-t);color:var(--accent-d)}
.btn-soft:hover{background:color-mix(in oklab,var(--accent-t) 70%,var(--accent-ring))}
.btn-danger{background:transparent;color:var(--danger);border-color:transparent}
.btn-danger:hover{background:color-mix(in oklab,var(--danger) 10%,transparent)}
.btn-lg{--bh:52px;padding:0 26px;font-size:15.5px;border-radius:13px}
.btn-sm{--bh:34px;padding:0 13px;font-size:13px;border-radius:9px}
.btn-sm svg{width:15px;height:15px}
.btn-block{width:100%}
.btn-icon{width:var(--bh);padding:0}

/* ---------- Cards / surfaces ---------- */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm)}
.card-pad{padding:22px}
.hairline{height:1px;background:var(--border);border:0;margin:0}

/* ---------- Inputs ---------- */
.field{display:flex;flex-direction:column;gap:7px}
.label{font-size:12.5px;font-weight:600;color:var(--text-2);letter-spacing:.01em}
.input,.textarea,.select{
  width:100%;background:var(--surface);border:1px solid var(--border-2);border-radius:11px;
  padding:11px 13px;font-size:14.5px;color:var(--text);transition:border-color .15s, box-shadow .15s;
  font-family:var(--font-body);
}
.input::placeholder,.textarea::placeholder{color:var(--text-3)}
.input:focus,.textarea:focus,.select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3.5px var(--accent-t)}
.textarea{resize:none;line-height:1.55}
.select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%2356635E' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:38px;cursor:pointer}

/* ---------- Badges / chips ---------- */
.badge{display:inline-flex;align-items:center;gap:6px;height:24px;padding:0 9px;border-radius:7px;font-size:12px;font-weight:600;letter-spacing:.01em}
.badge-accent{background:var(--accent-t);color:var(--accent-d)}
.badge-muted{background:var(--surface-2);color:var(--text-2)}
.badge-amber{background:#FEF4E2;color:#B45309}
.badge-blue{background:#EAF1FE;color:#2563EB}
.badge-violet{background:#F3EEFF;color:#7C3AED}
.dot{width:7px;height:7px;border-radius:50%;flex:none}
.chip{display:inline-flex;align-items:center;gap:7px;height:32px;padding:0 12px;border-radius:9px;border:1px solid var(--border-2);background:var(--surface);font-size:13px;font-weight:500;color:var(--text-2);cursor:pointer;transition:all .14s}
.chip:hover{border-color:var(--text-3);color:var(--text)}
.chip.is-on{border-color:var(--accent);background:var(--accent-t);color:var(--accent-d)}
.kbd{font-family:var(--font-mono);font-size:11px;font-weight:500;background:var(--surface-2);border:1px solid var(--border);border-bottom-width:2px;border-radius:6px;padding:2px 6px;color:var(--text-2)}

/* ---------- Avatar ---------- */
.avatar{position:relative;border-radius:50%;display:grid;place-items:center;color:#fff;font-family:var(--font-display);font-weight:600;flex:none;overflow:hidden}
.avatar.sq{border-radius:30%}

/* ---------- Waveform ---------- */
.wave{display:flex;align-items:center;gap:3px;height:22px}
.wave span{width:3px;border-radius:3px;background:currentColor;height:30%;animation:wv 1s ease-in-out infinite}
.wave.lg span{width:4px;gap:4px}
@keyframes wv{0%,100%{height:22%}50%{height:100%}}

/* ---------- Layout helpers ---------- */
.row{display:flex;align-items:center}
.col{display:flex;flex-direction:column}
.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}.gap16{gap:16px}.gap20{gap:20px}.gap24{gap:24px}
.grow{flex:1}
.muted{color:var(--text-2)}
.faint{color:var(--text-3)}
.center{align-items:center}.between{justify-content:space-between}
.wrap{flex-wrap:wrap}

/* placeholder media */
.ph{background:
   repeating-linear-gradient(135deg, var(--surface-2) 0 11px, var(--surface-3) 11px 22px);
   border:1px solid var(--border);border-radius:var(--radius);display:grid;place-items:center;color:var(--text-3);
   font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase}

/* page fade */
.fade-in{animation:fadeIn .34s cubic-bezier(.3,.8,.4,1) both}
@keyframes fadeIn{from{transform:translateY(9px)}to{transform:none}}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}

/* nav */
.nav-item{display:flex;align-items:center;gap:11px;height:40px;padding:0 12px;border-radius:10px;color:var(--text-2);font-weight:500;font-size:14px;cursor:pointer;transition:all .14s;position:relative}
.nav-item:hover{background:var(--surface-2);color:var(--text)}
.nav-item.is-active{background:var(--accent-t);color:var(--accent-d);font-weight:600}
.nav-item svg{width:18px;height:18px;flex:none}

#root{min-height:100vh}
.app-scroll{height:100vh;overflow-y:auto}

/* landing logo hover */
.logo-pop{transition:transform .18s cubic-bezier(.3,.8,.4,1);cursor:default}
.logo-pop:hover{transform:translateY(-3px)}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="ui.jsx"></script>
<script type="text/babel" src="brandlogos.jsx"></script>
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="landing.jsx"></script>
<script type="text/babel" src="auth.jsx"></script>
<script type="text/babel" src="home.jsx"></script>
<script type="text/babel" src="agents.jsx"></script>
<script type="text/babel" src="integrations.jsx"></script>
<script type="text/babel" src="meetings.jsx"></script>

</body>
</html>
